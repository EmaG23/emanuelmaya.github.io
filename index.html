<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis OS 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="desktop-os">

  <div class="desktop-icons">
    <div class="icon-item">
      <div class="icon-img">🖥️</div>
      <span>My PC</span>
    </div>
    <div class="icon-item">
      <div class="icon-img">📸</div>
      <span>ALBUMES</span>
    </div>
    <div class="icon-item">
      <div class="icon-img">📝</div>
      <span>CARTAS.txt</span>
    </div>
    <a href="historia.html" class="icon-item">
      <div class="icon-img">📂</div>
      <span>NUESTRA_HISTORIA.exe</span>
    </a>
  </div>

  <main class="window-container">
    <div class="pixel-window">
      <div class="window-header">
        <span class="window-title">WELCOME.EXE - v1.0</span>
        <div class="window-controls"><span>_</span><span>□</span><span>X</span></div>
      </div>
      <div class="window-content">
        <h1>¡Hola Genesis! 💗</h1>
        <p>Bienvenida a tu rincón digital. Explora tus recuerdos.</p>
        <div class="placeholder-img">[ FOTO PRINCIPAL ]</div>
        <p class="window-footer">425 días, 14h, 23m, 05s de amor 💕</p>
      </div>
    </div>
  </main>

  <footer class="taskbar">
    <div class="start-btn">Start</div>
    <div class="task-apps">
      <div class="task-tab active">Welcome.exe</div>
    </div>
    <div class="task-tray">
      <div class="tray-icons">🎵 🌙</div>
      <div class="clock">11:11 PM</div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
