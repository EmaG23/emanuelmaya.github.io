<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis OS 💗</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="desktop-os">

  <div class="desktop-icons">
    <a href="historia.html" class="icon">
      <div class="pixel-folder">📁</div>
      <span>HISTORIA.EXE</span>
    </a>
    <div class="icon">
      <div class="pixel-folder">📂</div>
      <span>ALBUMES</span>
    </div>
    <div class="icon">
      <div class="pixel-folder">📝</div>
      <span>NOTAS.TXT</span>
    </div>
  </div>

  <div class="window-wrapper">
    <div class="window">
      <div class="window-header">
        <span class="window-title">WELCOME.EXE</span>
        <div class="window-controls"><span>_</span><span>□</span><span>X</span></div>
      </div>
      <div class="window-content">
        <h1>¡Hola Genesis! 💗</h1>
        <div class="placeholder-box">[ NO IMAGE ]</div>
        <p>Haz doble clic en las carpetas para explorar.</p>
      </div>
    </div>
  </div>

  <footer class="taskbar">
    <button class="start-button">Start</button>
    <div class="active-apps">
      <div class="app-tab">Welcome.exe</div>
    </div>
    <div class="system-tray">11:11 PM</div>
  </footer>

  <div class="pooh-container">
    <img src="images/winnie-the-pooh-love.gif" class="pooh-walk">
  </div>

  <script src="js/script.js"></script>
</body>
</html>
