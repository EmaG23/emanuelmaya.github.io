<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis & Ema 💗 OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pixel-os">

  <div id="corazones-container"></div>

  <nav class="pixel-nav">
    <div class="nav-tab active" onclick="mostrarSeccion('home', event)">HOME</div>
    <div class="nav-tab" onclick="mostrarSeccion('albumes', event)">ALBUMES</div>
    <div class="nav-tab" onclick="mostrarSeccion('historia', event)">HISTORIA</div>
    <div class="nav-tab" onclick="mostrarSeccion('mensajes', event)">MENSAJES</div>
  </nav>

  <main class="desktop">
    <section id="home" class="tab-content active">
      <div class="pixel-window">
        <div class="window-bar"><span>BIENVENIDA.EXE</span><div class="controls"><span>_</span><span>X</span></div></div>
        <div class="window-content">
          <h1>¡Hola mi Amor! 💗</h1>
          <div class="placeholder-box">
            <span>[ NO IMAGE ]</span>
            <p>Foto Principal del Home</p>
          </div>
          <p>Explora nuestras pestañas para ver nuestros recuerdos juntos.</p>
        </div>
      </div>
    </section>

    <section id="albumes" class="tab-content">
      <div class="pixel-window">
        <div class="window-bar"><span>ALBUMES.SYS</span><div class="controls"><span>_</span><span>X</span></div></div>
        <div class="window-content">
          <div class="pinterest-gallery">
            <img src="images/gal1.jpg" alt="Recuerdo 1">
            <img src="images/gal3.jpg" alt="Recuerdo 3">
            <div class="foto-gato" onclick="tocarSonidoGato()">
              <img src="images/gal2.gif" alt="Gatito">
              <audio id="sonido-gato"><source src="music/gato.mp3" type="audio/mpeg"></audio>
            </div>
          </div>
          <div class="placeholder-box" style="margin-top:20px;">
            <span>[ NO IMAGE ]</span>
            <p>Próximo Viaje...</p>
          </div>
        </div>
      </div>
    </section>

    <section id="historia" class="tab-content">
      <div class="pixel-window">
        <div class="window-bar"><span>HISTORIA.EXE</span><div class="controls"><span>_</span><span>X</span></div></div>
        <div class="window-content">
          <div class="contador" id="contador"></div>
          <video controls class="styled-video"><source src="videos/video.mp4" type="video/mp4"></video>
